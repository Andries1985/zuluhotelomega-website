baseURL: "http://localhost:1313"
title: Zuluhotel Omega
copyright: "Copyright © {year} [Zuluhotel Omega](https://zuluhotelomega.com/). All Rights Reserved."
enableRobotsTXT: true
timeout: 120s
enableEmoji: true
pluralizeListTitles: false

# title_sections: true # when false, remove the sections from the title.
# title_sections_depth: 0 # the depth of sections on the title.
# title_sections_depth_dir: end # when start, the depth is counting from the root sections.

# permalinks:
#   page: 
#     infovault: /info/:slug/
#     classes: /info/classes/:slug/
#     items: /info/items/:slug/
#   section:
#     infovault: /infovault/

outputs:
  home:
    - HTML
    - Offline        # required by PWA module for displaying the offline pages.
    - RSS
    - SearchIndex    # required by search module.
    - WebAppManifest # required by PWA module to make your site installable.

taxonomies:
  section: sections
  tag: tags

build:
  writeStats: true # required by PurgeCSS.

markup:
  goldmark:
    renderer:
      unsafe: true
  highlight:
    noClasses: false
    lineNos: true
    lineNumbersInTable: false

# see https://gohugo.io/content-management/related/#configure-related-content
related:
  includeNewer: true
  indices:
  - name: keywords
    weight: 100
  - name: tags
    weight: 80
  - name: categories
    weight: 60
  - name: authors
    weight: 10
  - name: date
    weight: 10
  threshold: 10 # for testing, increase it to suit your case.
  toLower: false

security:
  funcs:
    getenv:
      - ^HUGO
      - CI$
      - PWD
